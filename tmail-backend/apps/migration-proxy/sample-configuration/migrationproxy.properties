# IMAP backends the proxy relays authenticated connections to (old / new). The SMTP old/new/external
# routing lives in mailetcontainer.xml instead. Keys: imap.<target>.{host,port,ssl,
# ssl.ignoreCertificates,forwardProxyInfo}.
imap.old.host=${sys:migration.imap.old.host:-old-backend}
imap.old.port=${sys:migration.imap.old.port:-143}
imap.old.ssl=false
imap.old.ssl.ignoreCertificates=false
imap.old.forwardProxyInfo=false
imap.new.host=${sys:migration.imap.new.host:-new-backend}
imap.new.port=${sys:migration.imap.new.port:-143}
imap.new.ssl=false
imap.new.ssl.ignoreCertificates=false
imap.new.forwardProxyInfo=false

# Optional. How long the proxy waits while connecting to and replaying the authentication against a
# backend before failing a LOGIN. Defaults to 30s.
imap.handshakeTimeout=30s
